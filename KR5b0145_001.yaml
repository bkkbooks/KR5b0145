front:
  text: 上清骨髓靈文鬼律卷上中同卷
  hash: sha256:6f0ff0e1776786ac1410144b4994faa37e64bd48b234a097dda949408f44beec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0145_HFL_001-001a, image: hfl/0203/0203-092.png}
body:
  text: 紫微宫使日直元君饒洞天定正受上清大洞籙行天心正法鄧有功重編法道門二十七條諸行法官乃陽行隂報並依式歲考功績如能止邪抑非治困拯危度死超生含靈受賜解除怨仇者依儀遷職如傍循私曲隨惡長姦者許三官紏察以聞當議重行黜責諸發遣文字危急行劄子限當時謂病篤㑹問隂府天曹命數延促之類次緊牒城隍限一日次申東嶽立獄催鬼神限二日常程給限並不過三日輒有留滯半日杖一百渉私故徒一年情重者加一等在道阻節者以其罪罪之諸應管東嶽差到神將吏兵三年一替一年一替者聽並具勞績過犯報本嶽考察賞罰仍於去替一月前預差替人願留再任者關本嶽應替不替不應替而替者杖一百有故者勿論諸神將被命報應稽遲者杖一百縁事害人受賂者徒二年天兵將吏仍具所犯因依奏聞諸行法事有不便者不得擅行攺易即時奏請以俟報應謂如遣鬼不去即符使不靈神之類違者徒二年非行法官輒千預者徒三年諸差使鬼神不任職誤取生人魂魄或令發狂致疾者流一千里因而害人性命加二等毀法不遵者處死諸行法官所至許帶符印隨行在處稱行司應有須索呼召將吏等輒違戾者徒一年干仙班者具事因奏聞諸承受文字遺墜者畫時經驅邪院自陳檢㑹别行仍責限追尋不獲者杖一百限内尋獲與免罪諸鬼神應送所置輒違而不徃者流三千里累犯者處死諸神將吏兵等因追攝鬼祟殘害受賂者徒二年若隱芘縱令逃避者以犯人罪罪之若罪人在壇顯驗通露後忽因事身死者具將吏所責情狀奏聞諸神將名山大川城隍社令及三品神衆凡遇承受驅邪院文字並須驗認印記嚴謹護持速具報應輒有輕易者徒二年諸鬼神等受驅邪院發遣經宿不離當處者一日徒一年十日加一等罪止徒三年諸邪祟經驅遣而六甲土公司命等神輒隱藏不發去者徒三年因而害人性命者流三千里天曹降旨留住者勿論諸民人有事告訴行法官受接不行雖行而苟簡及妄入鬼神罪目者杖一百不候告而别指事故行遣者非諸當職之神輒與民人婦女私通者流三千里情理重者奏裁如地分鬼神犯者加一等諸鬼神無故害人性命及偷盜人間財物不受咨懇被捉者處死所屬城隍土地等故縱者同罪失覺察者杖一百諸被使鬼神不即時徃幹者杖一百緊切事干人命徒二年因而至死流三千里受敕符違而不去者處死諸蝗蟲旱潦天霜雪雹害民稼穡本地分神衆不能救濟驅邪院差將吏同力止絶違者杖一百事干天曹時行年災許具章表奏聞諸神將吏兵應使而不使不應使而使者一人杖一百十人加一等罪止徒三年諸救濟民人疾苦合用干礙神鬼呼召輒不到者流三千里雖到而不協心搜捕幹捷者徒二年天府差幹他事者勿論諸天行疫疾令人患瘡腫走痛之𩔖隷十二年王子統行所主鬼神受驅邪院遣除事合遵禀天曹拘收者即時報應具奏上界違者杖一百諸山川土地司命城隍受命搜捕邪祟輒有違滯故縱於經歷地分害人者直送東嶽處斷主者失覺察杖一百諸提舉城隍社令有過者具奏北極取㫖三官紏察關驅邪院施行諸方境内遇年災大疫損傷人民牛馬畜獸之𩔖被吿即關年王神收毒仍奏知上界違者杖一百諸囹圄久淹受苦之人所犯非辜實負冤屈諸處雪理不明即委當處城隍獄神顯諭推勘官吏省悟實情立爲委決違者徒一年如囚人實犯隂譴者勿論諸神將吏兵輒離行法官者杖一百遇有急闕許於近便神祠差借兵不得過五百人幹辦訖犒賞推恩申奏所屬錄功諸鬼神承受天府委幹稽留不行五日杖一百十日加一等罪止徒三年有緣故者具奏天府太甲門二條諸林谷祅異累害人者處死所部鬼物非過干累及者送東嶽處分應干經歷地分不覺察杖一百同情犯者罪亦如之諸林木散大爲人欽仰立祠祈禱無福報者並除之因立祠而不爲害善能興福於人者聽以有無功績奏聞違者杖一百太戊門一七條諸地氣所産育養之物遇災年須出生地毛如鬼神無故出入别興風雨而因損傷稼穡害及人命者並流一千里仙官拘執六地犯者具奏天府諸神鬼盜人財滿千錢者流二千里不滿千錢徒二年若常住供獻之物不以多寡滅形諸地分主首故縱邪祟於部下爲害者關日遊神吏謄報違者杖一百諸掌文字管攝邪魔差當日功曹將吏承受有稽遲投至不明磨擦損汚者杖一百私拆封角視者徒二年奏書有漏泄遺墜者流三千里諸鬼神妄攝人魂者流三千里因而致斃者處死諸神鬼呼召不至輒違慢不恭者徒三年諸鬼神非攝受於人世不得與生靈混處違者杖一百天府謫仙者非如妄假名目邀求祭祀者徒二年切害者送東嶽處置拒捕者處死諸鬼神無故在人家潜伏妄興妖祟爲害經宿不去者杖一百五日加一等罪止徒二年被命遣不去者處死諸人間染疾旬月淹延不退夢寐與鬼魅交通者委所居地祇具事狀申東嶽誅滅違者杖一百諸驅邪院官行天符委山川地主收捕鬼祟不即力幹違慢者徒一年正一門四條諸稱水者不以大小淺深善能滋養稼穡而不隨時者許九江水帝察其功過保奏違者杖一百諸龍神在江河湖潭湫水有所主者謂之主正則祠之若因大風雨無故非理出遊害人稼穡者徒一年妄邀祭祀者徒二年掌水司引水因漂溺田屋苖稼被害及五十家巳上者流三千里不及五十家徒三年災年時行地分變異者勿論仍具表以聞諸龍神鬼主江河汙流去處若故曲邀舟車祭祀者徒二年妄興風雨翻䧟田屋至傷人命一人流三千里十人處死十人巳上滅形干涉湖潭主守並同罪本地分不紏者罪亦如之諸隱伏神鬼合起兩澤不急救旱救苦水主同情隱匿不爲放露者並徒三年亡祟門六條諸亡者有怨於生人曾經地府陳理未結絶而擅於人家作祅異尅害他人僥求功果爲報雖非損人命而動煩立獄仇對平人者關地府滅形諸無道邪祟隱顯形影放火撒血引弄家畜之𩔖驚犯生人者流三千里至害性命者處死諸鬼祟放火在人居室或籠櫃中燒𤑔財物舍宅及十戸者處死不及十戸徒三年送酆都重役地分知情故縱不紏者流三千里諸伏屍鬼怪古物精祅一切無名之鬼妄託不繫籍身死輒停世間不去者徒一年妄假威勢曲求祭祀陷害生人流二千里地主者知而不紏同罪諸鬼祟傷害生人因追捉藏伏者徒三年拒捕輒與吏兵鬬敵者處死諸孤露無主邪鬼假於新死故亡之便纏繞生人有所求者流一千里傷人命者滅形委是家親眷屬逐時有闕祭祀因而作祟者以肴饌祭享善功爲報化諭遣退若受祭享福力後依前爲害生人者送東嶽於下鬼籍中拘條國祀門五條諸國家不載祠典神鬼妄興祅孽誑惑人民輒爲禍福者流三千里曾傷人命者滅形諸鬼神雖不載祠典而能福及於民者當考功績以聞推恩若自矝其功而輒便妄以祅異於人興疾疫須求禱祀而不退者徒三年至傷人命者流三千里及十人處死十人巳上者滅形諸里社本界神祠水陸二路見係陽界靈感該在祀典不得受人間曲祀及不得受人厭呪生命違者紏察申三官當議重行黜陟諸祀典福神有害於人間者具所犯奏取敕裁諸朝列功臣名賢因立廟祀後有害於民者立便遣之違而不去關東嶽并具所犯奏聞飛奏門二條諸急切飛奏限兩時報應上天急切與地嶽靈官行報者不同若違時不報或因謄奏有失者並杖一百仍許再奏𠊱報施行如驅邪院悮報因而違者勿論諸奏書緊切限一日次緊限三日常程限七日報應並謂奏上天者皆用引劄通落須經歷地分護送出界輒邀攔拘滯者一日杖一百十日加一等罪止徒三年若情理切害者並具事因奏聞上清骨髓靈文鬼律卷上
