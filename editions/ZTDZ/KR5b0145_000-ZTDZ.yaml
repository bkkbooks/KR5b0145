front:
  text: 上清骨髓靈文鬼律序陶八
  hash: sha256:f437941eb7cae45a665fa027ec34cdb8a90d8f1ff1b9a71263fa5ba540707de2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0145_SJB_000-060908c, image: sjb/06/060908c.png}
body:
  text: 受上清大洞籙行天心正法臣鄧有功撰臣聞書曰天道福善禍淫又曰天命有德天討有罪夫善者必福之淫者必禍之有德則在所命有罪則在所討此天之道也天之臨下豈特明之於人爲然哉雖幽之於鬼神其不爾是故神有功於國與民者莫不載之祀典而秩祭之乃若邪怪之鬼物爲祟爲厲爲祅爲孽擾民害物者莫不有以治之則其爲患可勝計耶此上清骨髓靈文所以俾付正直者使之以奉行也其目有三曰鬼律曰玉格曰行法儀式合而言之通謂之骨髓靈文也鬼律者天曹割判入驅邪院北帝主而行之玉格并行法儀式者玉帝特賜驅邪院以掌判也其要皆所以批斷鬼神罪犯輔正驅邪與民爲福爲國禦災者焉臣竊見玉格之文尋常法師只以口傳而行法儀式又隱而不諭故靈文因此散缺所存者鬼律而巳鬼律雖存其俗師不能深曉其意加之傳寫訛謬文理舛錯遂致廢缺只以符水治病多致誑惑豈不負高天之意哉蓋靈文五十六條者尊一於北極總領包括天地隂陽五行之數殺生之理以邪剋正者罔不隷焉玉格儀式六十四條若八卦生生無窮之象也鬼律配玉格正條一十六合七十二即氣𠊱所攝也有所行邪即付泰山七十二司缺其一則法不全而司不正矣是則以道爲法之體以律爲法之用鬼物邪氣之所干必體道以正之故曰正法也行事儀式四十八條以三十六表三十六將餘十二時神常置左右攝歸一身故曰行事儀又以身爲一眞之舍動爲仙化靜與神黙豈非自然之妙耶臣嘗紬繹鬼律竊見其文詳悉精緻推原其本則祖仙饒洞天初爲府吏用心公平執法嚴正斷獄不枉衆心愜適昭格乾象靈光下燭地藏爲之開闢而祕文出見即斯鬼錄之法實皇天之所賜也祖仙洞天以謂天人雖異理則一致即倣以國家法律參校深得輕重之意而定其刑罰之例然則鬼神有影響而不可執著無所施其鞭扑有罪犯則苦役之故酆都律言鬼以負山之勞龍以穿池之役則若是之有徒役也女青鬼律云當天圓三帀則若世之有流竄也九地律云無上滅形則若世之處置也玄都律云分形散影即若世之法外也以此行於世間斷治鬼神最爲詳宻臣夙縁幸㑹上覯眞科遭遇名師得以傳授十數年間嘗於洪州西山玉隆觀江州廬山太平觀南康軍簡寂觀舒州靈仙觀博求妙本前後所收上清鬼律共五部校對訛舛一依舊本排定編次鬼律七門五十六條玉格十六條行法儀式四十八條總計一百二十條分爲三卷逐一勘當纎悉周備遂以所得新故之文焚上天闕申驅邪院等處繼獲報應分明更無遺缺是謂完本若乃只自奉行隱黙不傳于世則其功未廣恐違天意而貽隂譴也是以繕寫投進抑嘗聞昔之以道御天下者其鬼不神非其鬼不神其神不傷人以至兩不相傷而德交歸焉然後爲盛治之極致豈不偉哉伏惟皇帝陛下操至權而獨運斡萬化於不測百神受職庶民安堵則馭之者固自有道矣臣且區區以進此者非特欲乞頒行四方以廣其傳庶幾天下法師皆得完本依此行持使遐邦僻邑祅邪靈怪皆不得以傷人是亦少禆陛下道化之萬一也臣謹拜手稽首而爲之序
