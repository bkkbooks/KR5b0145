front:
  text: 上清骨髓靈文鬼律卷中
  hash: sha256:7ad324185bbe65afb8381d2db93ee4d8ad27aed7bb9fceb449ec030161027002
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0145_SJB_002-060913b, image: sjb/06/060913b.png}
body:
  text: 紫微宫使日直元君饒洞天定正受上清大洞籙行天心正法鄧有功重編玉格正條十六條諸應本院官法服星冠朱履非行持伏鬼魔者不得披戴違者徒一年不因法中事儀以勞鬼神者徒二年諸應本院官法職乃上清玉籍補充統攝三界邪魔所受正法中誥籙並以黄花帛上朱墨間寫裝嚴卷軸給付訖本師吿諭戒行動切應係法中祕語靈文口傳心授不得隱落違者三官紏察諸法官若善能傳授正法與有道之士行持救濟生民有感格者歲許具表章奏陳當議不次推恩諸應選人材可保奏而不奏不可奏而奏者並徒一年未經奏陳輒傳印訣者罪同上百日内本師自覺舉限内不首陳罪亦如之諸應奏名後不依師旨及有違背事儀者徒一年情理切害者本師具實吿奏先滅一身後罪九族諸應有道士吿傳正法以救民人主師圖其財利輒生艱阻者杖一百妄受貨止一匹徒一年十匹加一等罪止徒三年仍降兩資法職不滿一匹杖一百饋送酒食亦同諸行法官每歲拯救危篤病及二十人轉一資二十人巳上依仙班格陞職功行遷轉法位奏聞若人間吿訴不爲受理畫即救濟并妄遷補法位不實者並徒一年諸奏名人未奏詐稱法職者徒二年已奏而報應未下保舉審察不當即議重奏不俟報而妄稱師弟各徒二年諸新𥙷本院法官習篆天心符文星斗印訣綱歩之𩔖以金玉香木板書習了畫時以香水洗脫棄於長流水中違者徒一年諸以正法妄傳非人而希求財利或得財而中悔不傳者並徒二年未得財同假以他法影應爲正法傳之者徒三年諸以正法鬼律示非人或假借倩人傳寫侮翫不恭與非行法人持論泄漏訣目者徒三年以法示翫鬼神者徒一年故令他人以法陷鬼神者徒二年至死者流三千里不具威儀精潔觀讀者流二千里諸奏上清表章詞文關直日功曹通落東嶽文書付沿路土地收捕鬼祟差本院神將吏兵告奏事定輕重行遣如合奏而不奏不合奏而奏者巳上並杖一百諸正法天書祕籙符傳授與人者許謄寫故本藏之名山大川龕巖石匣中法官敕誥符文經轉資盡將巳前所授者皆焚化置之江湖中止得留見任官文書如不燒化以故法衣裹複投於江河内篆符替下筆墨朱紙硯水道冠法服諸般應替之物盡火化沈向水中或埋在洞府石室之内巳上並以訣法藏之違者徒一年諸傳度正法聽以甲子庚申三元八節五臘本命日奏名跪受劒印訣目筆硯朱墨法具皆祭而用之鐶劵質信器具金銀等物炋鎔售錢置供獻拯濟貧人不得入已侵使違者徒三年諸行法官急速去世者豫顯異境此乃上天吉命遂使卒然而去無者即是有司追取證對不明事宜令嗣法親眷速以符吿敕牒法服焚爲灰投長江關水官遞與其人幽司遵行違者徒二年諸法官功行果滿被召者法體二上三下如地蟲行耳有風聲目無神光天柱不起天鼓不鳴便穴腎堂皆痛神氣自涌泉穴透出頂門即便以誥籙符印函藏一處更新衣法服端坐遺囑嗣法親眷訖蛻去前有瑞雲仙仗迎引直赴洞府授仙官領職治事若法體覺知不能支持當處土地寵助嗣法親眷依上法函藏違者流三千里情理重者處死上清骨髓靈文鬼律卷中
