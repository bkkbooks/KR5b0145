front:
  text: 上清骨髓靈文鬼律卷下陶九
  hash: sha256:75357c89db1fae845f8925f54abb82a26a712639d2cc3f99918a5387d893a9fd
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0145_HFL_003-001a, image: hfl/0203/0203-120.png}
body:
  text: 紫微宫使日直元君饒洞天定正受上清大洞籙行天心正法鄧有功重編儀三十六條諸應正法鬼律文篆並以香篋綵囊巾笥貯之遇檢閲存神結界入靜方得開卷不得過五行祕之愼勿令鬼神盜觀諸善民能驅邪輔正實有濟物之功者收録奏名傳度正法補職受位諸應院中法具謂如劒印筆墨朱硯冠履法水之類未經奏祭者不得擅便私用諸應傳度弟子肘步投師師升壇說戒露剌飲丹分鐶破劵以誓盟言次與訣目符文宣示真誥跪授官職印劒之類師啓白上聖落三尸於四體釋萬罪於九玄關報所屬行持上合天心諸應神將吏兵謂東嶽差到者明受報應到院訖以酒食錢馬犒設常守本職准備驅用不得私使諸行法官經過有神祠處搯天丁訣鳴天鼓集身中靈官護法將吏隨行以布威儀神自畏伏諸應法官早朝取服旺氣作用奏書設醮不得燒乳香諸應世間人命稟天注壽祿如經本院拯救所病不起即是數盡劫終此即不可行移文字必為虛設諸應拯濟世人行遣文理不得繁雜可直言至誠之事仍聲說前人性命繫係天司奪祿減算乞不在今來所陳之限明乞報應諸授披訴狂邪祅怪者法官變神受詞押印遣行諸應醮設許奏三清玉帝錢馬外非時不得輒有䙝瀆焚奏錢馬先以鎮信綵繒同化差功曹直符齎送諸應醮奏於三清玉帝位傍列採訪使者一位餘位不得近帝座諸應入靖燒香行事修寫法中文字先以斗蓋勿視凡目諸被告訴致死而來呼煞者以㔶蓋鎮之諸應治牛馬六畜溫者問所損過數牒年王神驅之諸應授質信量其至誠收售之價錢為三分許用一置供獻一施貧者一即贍道諸立獄治病移文不伏者並攝囚治之諸應魅亂發魘心腎虛困者施符籙吞佩鎮之諸應治小兒驚呌夜啼安家竈簷神四天王飛天捷疾神以三光符治之諸應行法官逐日拯救世人合用贍道之費無受民賄自然上天賜祿遇闕即上章表言誠自有隂助更無乏少如輒受民物則世用不敷諸人家竈鋪營業被邪厭閉者以三光符遣神治之諸應修造營葺之類牒太歲安撫所轄土公等神無令興害諸應有怪異於陂塘堤岸以至修築不常非時為害損壞者要當處土地驅逐離彼仍以三光符鎮之違而不去者依法理斷諸遇瘟疫流行人罹疾苦依格劄委土地等神外牒年王神收回毒氣合飛奏者本院官禹步變神默言口章以聞諸孤民不宜男女貧無嗣息先以法退三刑六害星仍以籙佩諸應世人所居不利隂陽不和上下尅害連年困篤纍歲迍邅者授之以正籙諸傳度正法官受戒儀云夫道行己而為人所以能化其道者實由心之正也正心而明可持心以度人人無不正也故萬法因心而生因心而化能正己之心上合天心則未有不蒙其正焉行己之道以正其邪而邪莫不由伏焉然邪曲之行況因心之不正而為外物誘之因外邪之所蔽而內有所不明則正性缺然而昧邪馳騁畋獵令人心發狂是為外物蔽之如飲酒之蕩正性色欲之汨真情財利以忘仁義愛惡以成是非皆緣情而迷至理是謂大患仍協三惡業結三官因兹所見三界不息而沈滯不休也且不殺者仁也不盜者義也不淫者禮也不欺者信也不惑者智也六根七情十惡之愆宜須戒之不養父母不敬師友不念孤幼不報國恩不施正信不識上下切宜戒之不能束斂身心敬畏天道學太上法自利利人化道後昆信服師友遵奉教誨不侮先覺不輕信義不為悖逆不枉賄賂不違天背地一以不遵罪不可逭道法不神一身受殃九族同罪當須歸投無上道無窮法無量衆發此大誓方可傳付上清訣目佐天行化助國濟民治病扶危驅邪輔正宜對大道闔座高真心念口言自今日始常懷誓盟永不忘失稽首頓首感激之至巳上儀登壇唱禮衆官同讃詠諸應治事量其輕重行持不得妄動神將吏兵如接押辭狀畫時行遣勿得妄入鬼神之罪諸應傳度正法以法中用日設醮一座名曰傳度醮奏獻錢馬一百二十分以章醮儀中聖位列獻如數內減半奏者從之告報天地受舉官保明狀訖依法付囑符訣官告真籙之類關報東嶽割移名籍附天曹原赦九族出離幽冥超升生界登壇節次行事並依本法諸應驅邪院行法官並稱都大統攝三界邪魔事初補右判官次右大判官次左判官次左大判官巳上並謂同管勾院事次功格高者升入仙班補為都天大法主同判院事次加九天金闕大夫謂一年內救民及二十人凶歲旱潦枯槁刻日應禱升補者次水部尚書次木部尚書次土部尚書次金部尚書次火部尚書巳上謂歲救數過二十人者次或救大害功行優甚者遞相轉補次紫微宫使日直元君謂歲終助國除災安寧境土遣鬼兵隂助帝祚太平者升上職又一年內能驅滅分野蝗蟲災怪持法除去者加九天金闕御史又一年可發志願自於名山建立壇場投詞獻章上祝人君萬壽實有驗應者加金闕上仙侍中又一年自了性理出於物外提拔羣迷出離五苦親詣南曹添注主聖臣賢九族生天萬物受恩者加紫府上相次玄都大相次太玄上相次太極上相次金闕上相又一年通證大道無窮不執文字指喝有驗能治江湖河海蛟龍作害山崩派決實有利國濟民馘除大孽之功者加無極上相巳上自曰直元君至無極上相計九位遷職者合授上清九等大籙方許入此憲格餘職並依諸仙官以三元為首洞神巳下轉行初下元一品仙官次知北極驅邪院使中元一品仙官判北極驅邪院次上元一品仙官判酆都使巳上有功行果業次第遷轉身登金闕侍列三清諸應發三清玉帝北斗三光符行事官變神上奏具所請事因稱臣今准式付發遣願如臣言祝畢即便給直符使符到奉行諸應行法官出入常存領六丁四直土地監印力士等神隨行以法囑之無令失事諸行法官朝上帝驅瘟邪斷怪祟須先戴三台北斗變為驅邪院使諸朝見上帝奏請畢即詣天樞院部領四天王十二大神八金剛六丁六甲天蓬天猷元帥火鈴將軍五雷風雨神直出天門諸立獄須奏聞申泰山具事儀稱述巳於某月日於某方立建天獄奏上帝言五斗獄式十二條諸造驅邪院印方一寸八分以金玉為之篆以天文雷霹木造者聽召六丁六甲使者結界守護置訖以紅朱傅印面上先聞上界應造法中印記准此次同所授官花押字樣關東嶽照㑹訖方得使用臣洞天普受真人指示得天篆驅邪院并都天大法主星印二面謄本訖埋於故地遂以印式契對今世間所用大尺一寸八分即小尺二寸一分黍尺二寸四分皆同也其分寸上天法式數度所表使鬼神不測於毫髮之內故標於此為法定制諸篆天文符籙以天德月德水六丁六甲之筆黑帝墨太陽靈朱五龍寶硯一如傳度法訣收取奏上界訖方得行用諸應伏凶猛鬼神切要委差神將仍左右掐局邪訣又以左右斗蓋之己身宣敕云汝過罪已疏之吾以救民為心諸應奏醮為人禳災先奏星宿真君科狀後坐稱弟子禳災集福延齡命素代厄衣祿虔誠置備知鑒達誠諸應上清罡步念斗呪至天罡住便彈印訣却用天罡印指出若以符中呪唯是斗以貪狼星起之諸祭神以春夏秋冬四季六甲等日記之春六甲夏六丙秋六庚冬六癸日於門戶外以齊果香棗湯三分供養三界直符四直功曹一立土也先𠤎土也錢後具述情意云吾奉玉皇敕佐天行化助國濟民凡行符法斷絶為禍邪祟治病扶危作福祈祥皆憑使者通達上下諸位聖衆今日齎備酒果錢馬以伸醮禮伏望使者恩慈大布威光特垂靈祐次三上酒化錢念呪誓功曹云吾聞夙修大道令作至神莫不以功行居先救民是切故顯幽赴冥出水入火變現千途威通萬狀荷戈掛甲負鼓擎鐘出沒縱橫來去無礙邪魔聞之膽碎病者見之安寧吾以正法降魔用汝威靈伏助收伏鬼祟斷絶禍源福及良民功歸善道今以祭禮略報神勳少謝功勤深勞戮力伏請各各醉飽誓神將文汝等各宜醉飽酒飯整肅威儀具嚴天戒祗畏帝命奮威武之柄致平定之功嘉績有成明敦響答奉咨東嶽差來神將吏兵衆素韜神武夙藴機謀聞望清嚴儀德英偉響應鎮嶽之命來專討伐之權震動則凶魅裂形眦䝽則風雲變色靈戈所指大惡無前輔國救民濟時利物推心事道宜莫好功當院早膺仙誥素被道庥誤叨天吏之權惟藉至神之祐上則鎮身保命學道事天資我身真冀膺天爵中則顯揚聖化昭布隂功推此威靈願成績緒下則救人利物冶病去邪誅翦凶祅粵隆福泰庶使纍成善效響應幽微德著而汝等同分其利功成而汝等共享其榮盡舉當世之便宜共望正法之超冠利而不害威而有懲凡事虧中失順害物違天致討行誅芟邪輔正以神功而勝凶德以妙化而勝姦謀其何以當人孰能禦惟爾有神輔我大道急急如律令諸應神將吏兵以法訣付囑常當守護行持正法榜式北極驅邪院當院見管押將吏兵等係奉玉帝敕命差撥赴本院護法行化助國濟民救度羣品咸歸正道切慮不知本院有天印方一寸八分或方二寸一分或方三寸或方五寸管轄天兵百千億萬垓印篆一毫一紋容隱三十六萬垓兵將隨吾印轉邪魔聞之膽碎病者見之安寧上帝賜之力士捧擎從吾所行印中兵將百千億萬垓來往如風無形無迹變化不窮隱吾印中召之則至或見大身遍滿虛空頭戴昆崘肩擔日月手把帝鐘足踏夔龍或見小身入微塵中於絲髮內視大威通護持正法千變萬化救度有情不自伐功玄妙之力道法無窮切恐所管神將吏兵等不知有此法今故意違慢遣汝受罪不輕當院今將天兵將吏嶽兵將吏分屯番次准備緩急使喚如聞當院呼召急須速至如不係當番或不呼召並仰潜隱六合之內自隱自伏具下項一天兵將吏等常切准備呼召如不呼召不得擅離天界南斗天兵三千六百人黑殺神兵五萬人北斗部兵將三五部兵將正一部兵將放光部兵將天丁衆神力士衆神金剛衆神大明衆神飛龍騎吏一千人斬龍騎吏一千人決龍騎吏一千人統兵助法神將二員一泰山差到兵將仰分作兩番每一日一替參隨當院行法官出入遇有急速幹事不在此限仍只得於本院安泊無輒慢易仍委自統兵助法神將常切提轄統兵神將一員助法神將一員馬步兵若干人開東關到人數右件兵將神吏等今出榜曉諭仰詳前項指揮遵依奉行如稍有違必無輕恕汝等有功即當賞犒具奏上界賜之恩果的無虛示各宜知悉某年某月某日榜具銜位姓押弟子投師傳法詞某州縣鄉坊村里住姓某右某本命年月日時生所屬北斗某星君謹齎黃金九兩金鐶一對命素一端以代質信青絲四兩以代翦髮丹砂七兩以代㰱血捧詣法師某門下求授天心正法意欲助天行化為國救民以某竊觀浮世之數常憂危脆之身愧除害以不能思興利而無術操修既怠惶恐且深豈期多劫而來以慶今辰之㑹伏聞某人不掩玄都之路特揚太上之風抱行持一法之心增光道教垂拔度羣生之手拆破塵籠願持枯朽之根上賴栽培之力其於行已豈敢為非苟忘教育之恩甘受沈淪之苦輪回得度竭志奉修玄運相逢盡心報答伏望某人大開慈造少鑒微誠塵瀆之詞乞垂憫念下情無任望恩之至謹詞某年某月某日弟子求保舉師狀某州縣鄉坊里住姓某右某昨於某年月日具詞躬詣上清法師某人門下求授天心正法一部志願助天行化佐國救民治病扶危斷絶邪祟巳蒙許賜尅日奏名奉命依法訪尋有道名師保舉傳授竊念某生身幸處於中華存心久棲於象外尋師屢訪於知已傾誠始遇於明人比者伏惟某人得法至精興揚大道救民極切拯濟殊深某謹投某人願求保舉儻蒙收録則某豈不堅心尅志鏤骨銘骸至願修行上報提拔之賜不勝幸甚謹具狀告聞伏𠊱法㫖某年某月某日某處住姓某狀新授正法人給板符鐵券式夫板符鐵券者高九寸五寸應身五體四寸表身四靈長四尺九寸長四維法九星以黃花繪帛為之今行法之人多使柏木為符鐵板為券此皆不然以俗世所見非合仙旨板符則是籍符契之義鐵劵則誓堅確要之不移也乃大仙饒公所傳之意録之于後敕三台門下驅邪院右判官某人行持天心正法事准玉帝敕賜汝仰依教行持除邪輔正利濟羣生闡揚大道動合天心愼勿邪淫欺濫恭孝二親敬奉師長和睦六親勿隨勢利無傳非人若不依從令汝臨事不神三官考録功過依法賞罰者唵吽吽衆神稽首邪魔歸正敢有惡逆碎作微塵太微上帝敕急急如律令四天門王八大金剛五部大輪王十方護法神四天三界符籙內衆星都大神仙六丁六甲玄武大聖天丁力士風伯雨師五雷使者五嶽聖帝四瀆大王洞府名山宫廟五道等神天兵將吏嶽兵將吏等宜各依准上帝板符鐵券常切護助誅滅邪魔去病除妖其凶猛邪神輒敢違戾碎如微塵奉敕符到急急如律令右以爾忠厚之資粹和之質深勵趣真之志堅崇濟物之心須戒券以修身協真言之美讃尚宜知悉某年某月某日具保舉傳度師銜位臣姓某奉行三天扶教大法師正一真人靜應真君臣張道陖新授正法人補驅邪院官告式敕三台門下據驅邪院某官姓某保奏某人稟性純素守善存心每崇奉於高真常歸依於大道頗有助國救民之志願欲傳授天心正法符籙保身護命佐天行道利濟羣生某人年若干歲甲子某月日時生上屬北斗某星君躬俟俯報者惟三天正法萬道同歸矧吾言之易行豈汝心之難勉宜補北極驅邪院右判官同勾院事准式以聞右牒奉上清玉帝敕符到奉行某甲子年月日具傳度法師全銜臣姓某誥行三天扶教大法師正一真人靜應真君臣張道陖新補驅邪院官受法報應謝表式具位臣某誠惶誠恐頓首頓首再拜上言臣聞大道無形育包萬化上德不宰運斡三元庶彚咸彰最靈居首不二之法非離乎本守一之要蓋出於誠自顧凡材獲參仙品臣誠惶誠恐頓首頓首恭惟玉清聖境元始天尊上清真境靈寶天尊太清仙境道德天尊開天御曆執符為九百九十九億萬之道君闢地赤明龍漢乃十號十真百靈源之經寶三天正法五帝真符布化降祥垂光應物臣居凡賤叨奉至猷獲脫塵寰喜厠仙籍敢不上遵天戒下盡人情救苦為心報恩是切謹具表謝冒瀆天威下情無任望聖激切屏營之至臣某誠惶誠恐頓首頓首謹言某歲某月某日具位臣姓某上表上清骨髓靈女鬼律卷下
